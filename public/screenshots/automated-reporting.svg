<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" className="w-full h-full">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1e40af"/>
  <rect x="20" y="20" width="120" height="20" fill="white" rx="10"/>
  <text x="150" y="35" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Automated Reporting Dashboard</text>
  
  <!-- Report Templates -->
  <g transform="translate(40, 100)">
    <rect width="320" height="200" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Report Templates</text>
    
    <!-- Template items -->
    <g transform="translate(20, 50)">
      <rect width="280" height="30" fill="#f1f5f9" rx="4"/>
      <circle cx="15" cy="15" r="6" fill="#3b82f6"/>
      <text x="30" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">Daily Attendance Summary</text>
      <text x="30" y="23" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Auto-generated at 5 PM daily</text>
      <text x="250" y="18" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Active</text>
    </g>
    
    <g transform="translate(20, 90)">
      <rect width="280" height="30" fill="#f1f5f9" rx="4"/>
      <circle cx="15" cy="15" r="6" fill="#3b82f6"/>
      <text x="30" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">Weekly Parent Notifications</text>
      <text x="30" y="23" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Sent every Friday at 3 PM</text>
      <text x="250" y="18" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Active</text>
    </g>
    
    <g transform="translate(20, 130)">
      <rect width="280" height="30" fill="#f1f5f9" rx="4"/>
      <circle cx="15" cy="15" r="6" fill="#3b82f6"/>
      <text x="30" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">Monthly Analytics Report</text>
      <text x="30" y="23" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Generated 1st of each month</text>
      <text x="250" y="18" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Active</text>
    </g>
  </g>
  
  <!-- Recent Reports -->
  <g transform="translate(400, 100)">
    <rect width="360" height="200" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Generated Reports</text>
    
    <g transform="translate(20, 50)">
      <rect width="35" height="25" fill="#dc2626" rx="3"/>
      <text x="27.5" y="18" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">PDF</text>
      <text x="45" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">March 2026 - Daily Attendance</text>
      <text x="45" y="23" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Generated 2 hours ago</text>
      <rect x="280" y="8" width="60" height="18" fill="#eff6ff" rx="9" stroke="#3b82f6" stroke-width="1"/>
      <text x="310" y="19" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">Download</text>
    </g>
    
    <g transform="translate(20, 85)">
      <rect width="35" height="25" fill="#059669" rx="3"/>
      <text x="27.5" y="18" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">XLS</text>
      <text x="45" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">Weekly Parent Report</text>
      <text x="45" y="23" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Generated yesterday</text>
      <rect x="280" y="8" width="60" height="18" fill="#eff6ff" rx="9" stroke="#3b82f6" stroke-width="1"/>
      <text x="310" y="19" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">Download</text>
    </g>
    
    <g transform="translate(20, 120)">
      <rect width="35" height="25" fill="#7c3aed" rx="3"/>
      <text x="27.5" y="18" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">CSV</text>
      <text x="45" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">Late Arrival Analysis</text>
      <text x="45" y="23" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Generated 3 days ago</text>
      <rect x="280" y="8" width="60" height="18" fill="#eff6ff" rx="9" stroke="#3b82f6" stroke-width="1"/>
      <text x="310" y="19" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle">Download</text>
    </g>
  </g>
  
  <!-- Automation Rules -->
  <g transform="translate(40, 340)">
    <rect width="720" height="160" fill="white" rx="8" stroke="#e2e8f0" stroke-width="1"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Automation Rules</text>
    
    <!-- Rule 1 -->
    <g transform="translate(20, 50)">
      <rect width="200" height="80" fill="#f0f9ff" rx="6" stroke="#0ea5e9" stroke-width="1"/>
      <text x="10" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0369a1">Daily SMS Alerts</text>
      <text x="10" y="35" font-family="Arial, sans-serif" font-size="9" fill="#0284c7">When: Student absent by 9 AM</text>
      <text x="10" y="48" font-family="Arial, sans-serif" font-size="9" fill="#0284c7">Action: Send SMS to parent</text>
      <text x="10" y="61" font-family="Arial, sans-serif" font-size="9" fill="#0284c7">Status: ✓ Active</text>
    </g>
    
    <!-- Rule 2 -->
    <g transform="translate(240, 50)">
      <rect width="200" height="80" fill="#f0fdf4" rx="6" stroke="#22c55e" stroke-width="1"/>
      <text x="10" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#15803d">Weekly Reports</text>
      <text x="10" y="35" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">When: Every Friday at 3 PM</text>
      <text x="10" y="48" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">Action: Email to administrators</text>
      <text x="10" y="61" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">Status: ✓ Active</text>
    </g>
    
    <!-- Rule 3 -->
    <g transform="translate(460, 50)">
      <rect width="200" height="80" fill="#fef7ff" rx="6" stroke="#a855f7" stroke-width="1"/>
      <text x="10" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7c2d12">Late Pattern Alert</text>
      <text x="10" y="35" font-family="Arial, sans-serif" font-size="9" fill="#9333ea">When: 3+ late arrivals this week</text>
      <text x="10" y="48" font-family="Arial, sans-serif" font-size="9" fill="#9333ea">Action: Email counselor</text>
      <text x="10" y="61" font-family="Arial, sans-serif" font-size="9" fill="#9333ea">Status: ✓ Active</text>
    </g>
  </g>
  
  <!-- Stats -->
  <g transform="translate(520, 520)">
    <text x="0" y="15" fill="#374151" font-family="Arial, sans-serif" font-size="12" font-weight="bold">This Week</text>
    <text x="0" y="35" fill="#10b981" font-family="Arial, sans-serif" font-size="24" font-weight="bold">47</text>
    <text x="0" y="50" fill="#6b7280" font-family="Arial, sans-serif" font-size="10">Reports Generated</text>
    
    <text x="120" y="35" fill="#3b82f6" font-family="Arial, sans-serif" font-size="24" font-weight="bold">2,340</text>
    <text x="120" y="50" fill="#6b7280" font-family="Arial, sans-serif" font-size="10">SMS Sent</text>
  </g>
</svg>