<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" className="w-full h-full">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1e293b"/>
  <rect x="20" y="20" width="120" height="20" fill="#3b82f6" rx="10"/>
  <text x="150" y="35" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">DRAIS Attendance Dashboard</text>
  
  <!-- Stats Cards -->
  <g transform="translate(40, 100)">
    <!-- Present Students -->
    <rect width="160" height="100" fill="url(#cardBg)" rx="8"/>
    <circle cx="30" cy="30" r="15" fill="#10b981"/>
    <text x="55" y="25" font-family="Arial, sans-serif" font-size="12" fill="#374151">PRESENT</text>
    <text x="55" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981">312</text>
    <text x="55" y="65" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Students</text>
  </g>
  
  <g transform="translate(220, 100)">
    <!-- Late Students -->
    <rect width="160" height="100" fill="url(#cardBg)" rx="8"/>
    <circle cx="30" cy="30" r="15" fill="#f59e0b"/>
    <text x="55" y="25" font-family="Arial, sans-serif" font-size="12" fill="#374151">LATE</text>
    <text x="55" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f59e0b">18</text>
    <text x="55" y="65" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Students</text>
  </g>
  
  <g transform="translate(400, 100)">
    <!-- Absent Students -->
    <rect width="160" height="100" fill="url(#cardBg)" rx="8"/>
    <circle cx="30" cy="30" r="15" fill="#ef4444"/>
    <text x="55" y="25" font-family="Arial, sans-serif" font-size="12" fill="#374151">ABSENT</text>
    <text x="55" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ef4444">24</text>
    <text x="55" y="65" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Students</text>
  </g>
  
  <g transform="translate(580, 100)">
    <!-- Total Students -->
    <rect width="160" height="100" fill="url(#cardBg)" rx="8"/>
    <circle cx="30" cy="30" r="15" fill="#3b82f6"/>
    <text x="55" y="25" font-family="Arial, sans-serif" font-size="12" fill="#374151">TOTAL</text>
    <text x="55" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#3b82f6">354</text>
    <text x="55" y="65" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Students</text>
  </g>
  
  <!-- Attendance Chart -->
  <g transform="translate(40, 240)">
    <rect width="340" height="300" fill="url(#cardBg)" rx="8"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Today's Arrival Timeline</text>
    
    <!-- Chart bars -->
    <rect x="30" y="50" width="20" height="80" fill="#10b981"/>
    <rect x="60" y="70" width="20" height="60" fill="#10b981"/>
    <rect x="90" y="60" width="20" height="70" fill="#10b981"/>
    <rect x="120" y="80" width="20" height="50" fill="#f59e0b"/>
    <rect x="150" y="90" width="20" height="40" fill="#f59e0b"/>
    <rect x="180" y="85" width="20" height="45" fill="#10b981"/>
    <rect x="210" y="75" width="20" height="55" fill="#10b981"/>
    <rect x="240" y="95" width="20" height="35" fill="#ef4444"/>
    
    <!-- Time labels -->
    <text x="35" y="150" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">7AM</text>
    <text x="95" y="150" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">8AM</text>
    <text x="155" y="150" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">9AM</text>
    <text x="215" y="150" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">10AM</text>
  </g>
  
  <!-- Recent Arrivals -->
  <g transform="translate(400, 240)">
    <rect width="340" height="300" fill="url(#cardBg)" rx="8"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Recent Arrivals</text>
    
    <!-- Student entries -->
    <g transform="translate(20, 60)">
      <circle cx="15" cy="15" r="8" fill="#3b82f6"/>
      <text x="35" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">Abdullah Hassan</text>
      <text x="35" y="24" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">07:42 AM - On Time</text>
    </g>
    
    <g transform="translate(20, 100)">
      <circle cx="15" cy="15" r="8" fill="#3b82f6"/>
      <text x="35" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">Fatima Al-Rashid</text>
      <text x="35" y="24" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">07:58 AM - On Time</text>
    </g>
    
    <g transform="translate(20, 140)">
      <circle cx="15" cy="15" r="8" fill="#f59e0b"/>
      <text x="35" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">Ibrahim Musa</text>
      <text x="35" y="24" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">08:17 AM - Late</text>
    </g>
    
    <g transform="translate(20, 180)">
      <circle cx="15" cy="15" r="8" fill="#3b82f6"/>
      <text x="35" y="12" font-family="Arial, sans-serif" font-size="11" fill="#374151">Aisha Mohamed</text>
      <text x="35" y="24" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">08:23 AM - On Time</text>
    </g>
  </g>
  
  <!-- Fingerprint Scanner Mockup -->
  <g transform="translate(680, 400)">
    <rect width="80" height="120" fill="#1f2937" rx="8"/>
    <rect x="10" y="20" width="60" height="60" fill="#374151" rx="4"/>
    <circle cx="40" cy="50" r="20" fill="#4f46e5" opacity="0.3"/>
    <text x="40" y="100" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">ZK40 Scanner</text>
  </g>
</svg>