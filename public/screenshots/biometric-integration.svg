<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" className="w-full h-full">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1e293b"/>
  <rect x="20" y="20" width="120" height="20" fill="#3b82f6" rx="10"/>
  <text x="150" y="35" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Biometric Device Integration</text>
  
  <!-- Device Mockup - Dahua -->
  <g transform="translate(80, 120)">
    <rect width="200" height="280" fill="#2d3748" rx="12"/>
    <rect x="20" y="30" width="160" height="100" fill="#1a202c" rx="8"/>
    <text x="100" y="85" fill="#4a5568" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">DAHUA</text>
    
    <!-- Fingerprint area -->
    <rect x="60" y="150" width="80" height="80" fill="#4a5568" rx="8"/>
    <circle cx="100" cy="190" r="25" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="100" cy="190" r="15" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <circle cx="100" cy="190" r="8" fill="#3b82f6" opacity="0.8"/>
    
    <text x="100" y="255" fill="#a0aec0" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Place finger here</text>
  </g>
  
  <!-- Device Mockup - ZK40 -->
  <g transform="translate(320, 120)">
    <rect width="180" height="260" fill="#374151" rx="8"/>
    <rect x="15" y="25" width="150" height="80" fill="#1f2937" rx="4"/>
    <text x="90" y="70" fill="#6b7280" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">ZKTeco ZK40</text>
    
    <!-- Fingerprint scanner -->
    <rect x="50" y="130" width="80" height="80" fill="#4b5563" rx="6"/>
    <circle cx="90" cy="170" r="20" fill="none" stroke="#10b981" stroke-width="2"/>
    <circle cx="90" cy="170" r="12" fill="none" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    
    <text x="90" y="235" fill="#9ca3af" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Ready to scan</text>
  </g>
  
  <!-- Connection Flow -->
  <g transform="translate(540, 140)">
    <rect width="220" height="240" fill="#1e293b" rx="8" stroke="#334155" stroke-width="1"/>
    <text x="20" y="30" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Connection Status</text>
    
    <!-- Device connections -->
    <g transform="translate(20, 50)">
      <circle cx="10" cy="10" r="5" fill="#10b981"/>
      <text x="25" y="8" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">Dahua D2012 - Online</text>
      <text x="25" y="20" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">192.168.1.100</text>
    </g>
    
    <g transform="translate(20, 85)">
      <circle cx="10" cy="10" r="5" fill="#10b981"/>
      <text x="25" y="8" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">ZKTeco ZK40 - Online</text>
      <text x="25" y="20" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">192.168.1.101</text>
    </g>
    
    <g transform="translate(20, 120)">
      <circle cx="10" cy="10" r="5" fill="#f59e0b"/>
      <text x="25" y="8" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">ZK4500 - Pending</text>
      <text x="25" y="20" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">192.168.1.102</text>
    </g>
    
    <!-- Real-time log -->
    <text x="20" y="170" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Live Activity</text>
    <text x="20" y="190" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">08:15:23 - Student ID 1245 verified</text>
    <text x="20" y="205" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">08:15:45 - Student ID 1367 verified</text>
    <text x="20" y="220" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">08:16:12 - Student ID 1089 verified</text>
  </g>
  
  <!-- Data Flow Animation -->
  <g transform="translate(100, 450)">
    <text x="0" y="15" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Fingerprint Scan</text>
    <rect x="0" y="25" width="80" height="4" fill="#374151" rx="2"/>
    <rect x="0" y="25" width="60" height="4" fill="#3b82f6" rx="2"/>
    
    <text x="120" y="15" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">→ Processing</text>
    <circle cx="200" cy="15" r="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="200" cy="15" r="4" fill="#3b82f6"/>
    
    <text x="240" y="15" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">→ DRAIS Database</text>
    <rect x="370" y="5" width="40" height="20" fill="#10b981" rx="4"/>
    <text x="390" y="18" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">✓</text>
  </g>
  
  <!-- Speed indicator -->
  <g transform="translate(600, 480)">
    <text x="0" y="15" fill="#10b981" font-family="Arial, sans-serif" font-size="16" font-weight="bold">&lt; 2 seconds</text>
    <text x="0" y="35" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Average identification time</text>
  </g>
</svg>