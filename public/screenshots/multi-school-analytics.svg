<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" className="w-full h-full">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1e293b"/>
  <rect x="20" y="20" width="120" height="20" fill="#3b82f6" rx="10"/>
  <text x="150" y="35" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Multi-School Analytics Dashboard</text>
  
  <!-- School Selector -->
  <g transform="translate(40, 100)">
    <rect width="720" height="40" fill="#334155" rx="8"/>
    <text x="20" y="25" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">School Network Overview</text>
    <rect x="600" y="10" width="100" height="20" fill="#475569" rx="4"/>
    <text x="650" y="23" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">All Schools ▼</text>
  </g>
  
  <!-- Quick Stats Cards -->
  <g transform="translate(40, 160)">
    <!-- Total Students -->
    <rect width="165" height="100" fill="#1e293b" rx="8" stroke="#374151" stroke-width="1"/>
    <text x="15" y="25" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">TOTAL STUDENTS</text>
    <text x="15" y="50" fill="#3b82f6" font-family="Arial, sans-serif" font-size="28" font-weight="bold">8,547</text>
    <text x="15" y="70" fill="#10b981" font-family="Arial, sans-serif" font-size="10">↗ +156 this month</text>
    
    <!-- Schools Active -->
    <rect x="185" y="0" width="165" height="100" fill="#1e293b" rx="8" stroke="#374151" stroke-width="1"/>
    <text x="200" y="25" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">SCHOOLS ACTIVE</text>
    <text x="200" y="50" fill="#10b981" font-family="Arial, sans-serif" font-size="28" font-weight="bold">32</text>
    <text x="200" y="70" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">2 pending setup</text>
    
    <!-- Avg Attendance -->
    <rect x="370" y="0" width="165" height="100" fill="#1e293b" rx="8" stroke="#374151" stroke-width="1"/>
    <text x="385" y="25" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">AVG ATTENDANCE</text>
    <text x="385" y="50" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="28" font-weight="bold">94.2%</text>
    <text x="385" y="70" fill="#10b981" font-family="Arial, sans-serif" font-size="10">↗ +2.1% vs last week</text>
    
    <!-- Device Uptime -->
    <rect x="555" y="0" width="165" height="100" fill="#1e293b" rx="8" stroke="#374151" stroke-width="1"/>
    <text x="570" y="25" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">DEVICE UPTIME</text>
    <text x="570" y="50" fill="#10b981" font-family="Arial, sans-serif" font-size="28" font-weight="bold">99.8%</text>
    <text x="570" y="70" fill="#10b981" font-family="Arial, sans-serif" font-size="10">67/67 devices online</text>
  </g>
  
  <!-- School Performance Chart -->
  <g transform="translate(40, 290)">
    <rect width="340" height="250" fill="#1e293b" rx="8" stroke="#374151" stroke-width="1"/>
    <text x="20" y="30" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Top Performing Schools</text>
    
    <!-- School rankings -->
    <g transform="translate(20, 50)">
      <rect width="300" height="25" fill="#334155" rx="4"/>
      <circle cx="15" cy="12.5" r="8" fill="#fbbf24"/>
      <text x="18" y="17" fill="#1e293b" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">1</text>
      <text x="35" y="17" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">Northgate Schools - 98.7%</text>
      <text x="260" y="17" fill="#10b981" font-family="Arial, sans-serif" font-size="10">400 students</text>
    </g>
    
    <g transform="translate(20, 85)">
      <rect width="300" height="25" fill="#334155" rx="4"/>
      <circle cx="15" cy="12.5" r="8" fill="#c0c0c0"/>
      <text x="18" y="17" fill="#1e293b" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">2</text>
      <text x="35" y="17" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">Albayan Center - 97.2%</text>
      <text x="260" y="17" fill="#10b981" font-family="Arial, sans-serif" font-size="10">300 students</text>
    </g>
    
    <g transform="translate(20, 120)">
      <rect width="300" height="25" fill="#334155" rx="4"/>
      <circle cx="15" cy="12.5" r="8" fill="#cd7f32"/>
      <text x="18" y="17" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">3</text>
      <text x="35" y="17" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">Excel Islamic - 96.8%</text>
      <text x="260" y="17" fill="#10b981" font-family="Arial, sans-serif" font-size="10">250 students</text>
    </g>
    
    <g transform="translate(20, 155)">
      <rect width="300" height="25" fill="#334155" rx="4"/>
      <circle cx="15" cy="12.5" r="8" fill="#6b7280"/>
      <text x="18" y="17" fill="white" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">4</text>
      <text x="35" y="17" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">Ibun Baz Secondary - 95.4%</text>
      <text x="260" y="17" fill="#10b981" font-family="Arial, sans-serif" font-size="10">350 students</text>
    </g>
  </g>
  
  <!-- Trend Analysis -->
  <g transform="translate(400, 290)">
    <rect width="360" height="250" fill="#1e293b" rx="8" stroke="#374151" stroke-width="1"/>
    <text x="20" y="30" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Network-wide Trends</text>
    
    <!-- Attendance trend line -->
    <g transform="translate(20, 60)">
      <text x="0" y="15" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Weekly Attendance Rate</text>
      
      <!-- Grid lines -->
      <line x1="0" y1="30" x2="320" y2="30" stroke="#374151" stroke-width="1"/>
      <line x1="0" y1="60" x2="320" y2="60" stroke="#374151" stroke-width="1"/>
      <line x1="0" y1="90" x2="320" y2="90" stroke="#374151" stroke-width="1"/>
      <line x1="0" y1="120" x2="320" y2="120" stroke="#374151" stroke-width="1"/>
      
      <!-- Trend line -->
      <polyline points="0,100 45,95 90,90 135,85 180,80 225,75 270,70 320,65" 
                fill="none" stroke="#3b82f6" stroke-width="3"/>
      
      <!-- Data points -->
      <circle cx="0" cy="100" r="4" fill="#3b82f6"/>
      <circle cx="45" cy="95" r="4" fill="#3b82f6"/>
      <circle cx="90" cy="90" r="4" fill="#3b82f6"/>
      <circle cx="135" cy="85" r="4" fill="#3b82f6"/>
      <circle cx="180" cy="80" r="4" fill="#3b82f6"/>
      <circle cx="225" cy="75" r="4" fill="#3b82f6"/>
      <circle cx="270" cy="70" r="4" fill="#3b82f6"/>
      <circle cx="320" cy="65" r="4" fill="#3b82f6"/>
      
      <!-- Labels -->
      <text x="0" y="140" fill="#6b7280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Week 1</text>
      <text x="160" y="140" fill="#6b7280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Week 4</text>
      <text x="320" y="140" fill="#6b7280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Week 8</text>
    </g>
    
    <!-- Key metrics -->
    <g transform="translate(20, 210)">
      <text x="0" y="15" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Trend: Improving</text>
      <text x="0" y="30" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">+4.2% improvement over 8 weeks</text>
    </g>
  </g>
</svg>